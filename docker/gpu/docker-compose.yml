name: kokoro-fastapi-zh-gpu
services:
  kokoro-tts:
    image: kokoro-fastapi-zh-gpu
    container_name: kokoro-fastapi-zh-gpu
    build:
      context: ../..
      dockerfile: docker/gpu/Dockerfile
    volumes:
      - ../../api:/app/api
      - ./models:/app/api/src/models
      - ./voices:/app/api/src/voices
    user: "1001:1001"  # Ensure container runs as UID 1001 (appuser)
    ports:
      - "8880:8880"
    environment:
      - PYTHONPATH=/app:/app/api
      - USE_GPU=true
      - PYTHONUNBUFFERED=1
      - REPO_ID=hexgrad/Kokoro-82M-v1.1-zh
      - DEFAULT_VOICE=zf_094
      - KOKORO_V1_FILE=v1_1_zh/kokoro-v1_1-zh.pth
      - VOICES_DIR=/app/api/src/voices/v1_1_zh
      - API_LOG_LEVEL=DEBUG
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

