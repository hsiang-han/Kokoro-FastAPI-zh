name: CI
on:
  push:
    branches: [ "master", "pre-release" ]
  pull_request:
    branches: [ "master", "pre-release" ]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    # Match Dockerfile dependencies
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          espeak-ng \
          espeak-ng-data \
          git \
          libsndfile1 \
          curl \
          ffmpeg \
          g++ \
          cmake
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --extra test --extra cpu

    - name: Verify torch runtime
      run: |
        uv run python -c "import torch; print('torch=', torch.__version__); print('cuda_available=', torch.cuda.is_available())"

    - name: Run Tests
      run: |
        uv run pytest api/tests/ --asyncio-mode=auto --cov=api --cov-report=term-missing
